<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="deploy.local">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(266, 90%, 66%)"/>
      <stop offset="50%" stop-color="hsl(295, 88%, 64%)"/>
      <stop offset="100%" stop-color="hsl(330, 88%, 66%)"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Same rotated rounded square as the CSS .brand-mark, scaled to fill the
       viewBox with a little headroom so the rotation doesn't clip at small
       favicon sizes (16x16 in particular). -->
  <g transform="rotate(8 32 32)">
    <rect x="6" y="6" width="52" height="52" rx="12" fill="url(#brand)"/>
    <rect x="12" y="12" width="40" height="40" rx="6" fill="url(#sheen)"/>
  </g>
</svg>
